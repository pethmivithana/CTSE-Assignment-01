# MongoDB only - for local development
# Run: docker compose -f docker-compose.mongo.yml up -d
# Use with: npm run dev:local (from project root)
services:
  mongodb:
    image: mongo:7
    container_name: feedo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
