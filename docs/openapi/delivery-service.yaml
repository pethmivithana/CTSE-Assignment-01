openapi: 3.0.3
info:
  title: Feedo Delivery Service API
  description: Microservice for delivery management, driver operations, and order tracking
  version: 1.0.0
  contact:
    name: Feedo Team

servers:
  - url: http://localhost:3003/api/delivery
    description: Local
  - url: /api/delivery
    description: Via API Gateway

tags:
  - name: Drivers
  - name: Deliveries
  - name: Admin
  - name: Health

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service healthy

  /drivers/me:
    get:
      summary: Get current driver profile
      tags: [Drivers]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Driver profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  driver:
                    type: object
                    properties:
                      id: { type: string }
                      userId: { type: string }
                      name: { type: string }
                      email: { type: string }
                      isAvailable: { type: boolean }
        '401':
          description: Unauthorized
        '404':
          description: Driver not found

  /drivers/register:
    post:
      summary: Register driver (internal - from user service)
      tags: [Drivers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, name, email, phone]
              properties:
                userId: { type: string }
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN] }
                vehicleDetails:
                  type: object
                  properties:
                    model: { type: string }
                    licensePlate: { type: string }
      responses:
        '201':
          description: Driver registered
        '409':
          description: Driver already registered

  /drivers/{id}:
    get:
      summary: Get driver by ID
      tags: [Drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Driver profile
        '404':
          description: Driver not found

  /drivers/{id}/availability:
    put:
      summary: Update driver availability
      tags: [Drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                isAvailable: { type: boolean }
      responses:
        '200':
          description: Updated

  /drivers/{id}/accept:
    post:
      summary: Accept a delivery
      tags: [Drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deliveryId: { type: string }
      responses:
        '200':
          description: Delivery accepted

  /deliveries/available:
    get:
      summary: Get available deliveries for drivers
      tags: [Deliveries]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of available deliveries
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliveries: { type: array, items: { $ref: '#/components/schemas/Delivery' } }

  /deliveries:
    post:
      summary: Create delivery (from order service)
      tags: [Deliveries]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDelivery' }
      responses:
        '201':
          description: Delivery created
        '409':
          description: Delivery already exists

  /track/{orderId}:
    get:
      summary: Track delivery by order ID (public)
      tags: [Deliveries]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Delivery status

  /deliveries/history:
    get:
      summary: Get customer delivery history
      tags: [Deliveries]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Delivery history

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Delivery:
      type: object
      properties:
        _id: { type: string }
        orderId: { type: string }
        status: { type: string }
        driverId: { type: string }
        pickupLocation: { type: object }
        dropoffLocation: { type: object }
    CreateDelivery:
      type: object
      required: [orderId, restaurantId, customerId, pickupLocation, dropoffLocation]
      properties:
        orderId: { type: string }
        restaurantId: { type: string }
        customerId: { type: string }
        pickupLocation: { type: object }
        dropoffLocation: { type: object }
        deliveryNotes: { type: string }
