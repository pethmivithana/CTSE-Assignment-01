# DevSecOps - SAST with SonarCloud
# Add SONAR_TOKEN to GitHub repo Secrets (from sonarcloud.io)
name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          for dir in services/user-service services/restaurant-service services/order-service services/delivery-service services/payment-service services/notification-service api_gateway; do
            [ -f "$dir/package.json" ] && (cd $dir && npm ci 2>/dev/null || npm install 2>/dev/null || true)
          done

      - name: Check Sonar configuration
        id: sonar_cfg
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping SonarCloud scan. Set SONAR_TOKEN, SONAR_ORGANIZATION and SONAR_PROJECT_KEY repository secrets."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud Scan
        if: steps.sonar_cfg.outputs.enabled == 'true'
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # SONAR_TOKEN: Create at https://sonarcloud.io → My Account → Security
