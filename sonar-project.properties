# SonarCloud / SonarQube config - DevSecOps SAST
# 1. Create org + project at https://sonarcloud.io
# 2. Add SONAR_TOKEN to GitHub repo Secrets
# 3. Set sonar.organization to your SonarCloud org key

sonar.projectKey=feedo-microservices
sonar.organization=YOUR_SONARCLOUD_ORG

sonar.sources=services/delivery-service,services/user-service,services/restaurant-service,services/order-service,services/payment-service,services/notification-service,api_gateway
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/node_modules/**,**/*.test.js,**/*.spec.js
